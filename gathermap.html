<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GatherMap · Pack Meets · True Therian</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script>
(function(){
  var attempts = 0;
  var cdns = [
    'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js',
    'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js'
  ];
  function tryLoad(idx){
    if(idx >= cdns.length){ window._leafletFailed=true; return; }
    var s = document.createElement('script');
    s.src = cdns[idx];
    s.onload = function(){
      window._leafletReady = true;
      if(window._onLeafletReady) window._onLeafletReady();
    };
    s.onerror = function(){ tryLoad(idx+1); };
    document.head.appendChild(s);
  }
  tryLoad(0);
})();
</script>
<style>nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  padding:0 32px;height:58px;display:flex;align-items:center;
  background:rgba(8,10,8,.82);backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,179,0,.1);
  transition:background .4s,box-shadow .4s;gap:0;
}
nav.scrolled{
  background:rgba(6,8,6,.97);
  box-shadow:0 2px 24px rgba(0,0,0,.5);
  border-bottom-color:rgba(255,179,0,.18);
}
.nav-logo{
  font-family:'Cinzel',serif;font-size:1rem;font-weight:700;
  letter-spacing:.08em;color:var(--am);text-decoration:none;
  line-height:1.2;flex-shrink:0;margin-right:28px;
}
.nav-logo small{
  display:block;font-size:.38rem;font-family:'Inter',sans-serif;
  font-weight:300;letter-spacing:.35em;color:rgba(232,224,208,.38);
  text-transform:uppercase;
}
/* Desktop nav links — pill-style, clearly readable */
.nav-links{
  display:flex;gap:2px;list-style:none;align-items:center;flex:1;
}
.nav-links li a{
  display:flex;align-items:center;gap:5px;
  padding:6px 11px;border-radius:6px;
  font-size:.72rem;font-weight:400;letter-spacing:.06em;
  color:rgba(232,224,208,.75);text-decoration:none;
  transition:all .2s;white-space:nowrap;
}
.nav-links li a:hover{
  background:rgba(255,179,0,.1);color:var(--am);
}
.nav-links li a.active{
  background:rgba(255,179,0,.12);color:var(--am);
}
/* Icon characters before each link */
.nav-links li a .ni{
  font-size:.9rem;line-height:1;
}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto;padding-left:16px}
/* Lang button */
.lang-wrap{position:relative}
.lang-btn{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,179,0,.15);
  color:rgba(232,224,208,.65);padding:5px 10px;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:.68rem;
  display:flex;align-items:center;gap:5px;transition:all .2s;
  border-radius:5px;
}
.lang-btn:hover{border-color:var(--am);color:var(--am);background:rgba(255,179,0,.08)}
.lang-btn svg{width:13px;height:13px;fill:currentColor}
.lang-dd{
  position:absolute;top:calc(100% + 6px);right:0;
  background:#0d100d;border:1px solid rgba(255,179,0,.18);
  min-width:152px;z-index:600;display:none;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  border-radius:6px;overflow:hidden;
}
.lang-dd.open{display:block}
.lang-opt{
  display:block;padding:9px 14px;font-size:.7rem;
  color:rgba(232,224,208,.7);cursor:pointer;width:100%;
  background:none;border:none;font-family:'Inter',sans-serif;
  text-align:left;transition:background .18s;
}
.lang-opt:hover,.lang-opt.cur{background:rgba(255,179,0,.1);color:var(--am)}
/* User button — more prominent */
.user-btn{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,179,0,.08);
  border:1px solid rgba(255,179,0,.25);
  color:rgba(232,224,208,.85);
  padding:6px 14px;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:.7rem;
  letter-spacing:.06em;text-transform:none;
  transition:all .22s;border-radius:6px;
  white-space:nowrap;
}
.user-btn svg{flex-shrink:0}
.user-btn:hover,.user-btn.logged{
  border-color:var(--am);color:var(--am);
  background:rgba(255,179,0,.14);
}
.user-btn.logged{font-weight:500}
.user-btn.ceo{
  border-color:var(--ceo)!important;color:var(--ceo)!important;
  background:rgba(179,157,219,.1)!important;
}
.msg-dot{
  background:var(--red);color:#fff;font-size:.5rem;
  border-radius:50%;width:14px;height:14px;
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:700;margin-left:2px;
}
.nav-cta{
  background:var(--am);color:var(--ob);border:none;
  padding:7px 16px;font-size:.68rem;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;
  font-family:'Inter',sans-serif;font-weight:600;
  transition:all .25s;text-decoration:none;border-radius:5px;
  white-space:nowrap;
}
.nav-cta:hover{box-shadow:0 0 18px rgba(255,179,0,.45);background:#ffd040}
.nav-ham{
  display:none;flex-direction:column;gap:5px;
  cursor:pointer;background:none;border:none;padding:6px;
}
.nav-ham span{display:block;width:22px;height:1.5px;background:var(--am);transition:all .3s;border-radius:2px}

:root{
  --bg:#04060a;--tp:rgba(210,230,245,.92);--tm:rgba(210,230,245,.42);
  --acc:#4db8e8;--acc20:rgba(77,184,232,.22);--acc08:rgba(77,184,232,.08);
  --gold:#c8a95a;--gold20:rgba(200,169,90,.2);
  --green:#56e39f;--green20:rgba(86,227,159,.2);
  --red:#e05c6a;--red20:rgba(224,92,106,.2);
  --card:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);
  --night:rgba(4,8,16,.85);
}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;overflow:hidden}body{height:100%;overflow:hidden;display:flex;flex-direction:column;background:var(--bg);padding-top:58px;box-sizing:border-box}
body{font-family:'Crimson Pro',Georgia,serif;color:var(--tp);display:flex;flex-direction:column}

/* ── SCANLINE OVERLAY ── */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1000;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);
}

/* ── NAV ── */
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse-live 2s infinite}
@keyframes pulse-live{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
/* ── MAIN LAYOUT ── */
.main{flex:1;display:flex;min-height:0;position:relative;overflow:hidden}

/* ── MAP ── */
#map{flex:1;z-index:1;min-width:0}
#map .leaflet-tile-pane{filter:saturate(.55) brightness(.65) hue-rotate(200deg)}

/* Custom marker */
.meet-marker-wrap{position:relative}
.meet-pulse{
  position:absolute;
  border-radius:50%;
  animation:meet-ring 2.2s ease-out infinite;
  pointer-events:none;
}
@keyframes meet-ring{
  0%{transform:translate(-50%,-50%) scale(.5);opacity:.9}
  100%{transform:translate(-50%,-50%) scale(3.5);opacity:0}
}
.meet-dot{
  width:14px;height:14px;border-radius:50%;
  border:2px solid rgba(255,255,255,.8);
  cursor:pointer;transition:transform .2s;
  position:relative;z-index:2;
  box-shadow:0 0 12px currentColor, 0 0 24px currentColor;
}
.meet-dot:hover{transform:scale(1.4)}
.meet-dot.demo{background:var(--acc);border-color:rgba(77,184,232,.6)}
.meet-dot.user{background:var(--gold);border-color:rgba(200,169,90,.6)}
.meet-dot.imminent{background:var(--red);border-color:rgba(224,92,106,.6)}
.meet-label-popup{
  background:rgba(4,8,16,.9)!important;
  border:1px solid rgba(77,184,232,.3)!important;
  border-radius:0!important;
  color:rgba(210,230,245,.9)!important;
  font-family:'Cinzel',serif!important;
  font-size:.64rem!important;
  letter-spacing:.12em!important;
  padding:4px 8px!important;
  box-shadow:0 0 20px rgba(77,184,232,.15)!important;
  white-space:nowrap;
}
.leaflet-popup-content-wrapper{
  background:rgba(4,8,16,.95)!important;
  border:1px solid var(--acc20)!important;
  border-radius:0!important;
  color:var(--tp)!important;
  box-shadow:0 0 30px rgba(77,184,232,.2)!important;
  padding:0!important;
}
.leaflet-popup-tip{display:none!important}
.leaflet-popup-content{margin:0!important;width:auto!important}
.leaflet-popup-close-button{color:var(--tm)!important;font-size:1rem!important;top:8px!important;right:8px!important}

/* ── SIDEBAR ── */
.sidebar{
  width:360px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--night);border-left:1px solid rgba(77,184,232,.12);
  z-index:2;overflow:hidden;
}

/* Sidebar tabs */
.sb-tabs{
  flex-shrink:0;display:flex;border-bottom:1px solid var(--border);
}
.sb-tab{
  flex:1;padding:12px 8px;font-family:'Cinzel',serif;font-size:.6rem;
  letter-spacing:.18em;text-transform:uppercase;color:var(--tm);
  background:none;border:none;cursor:pointer;transition:all .25s;
  border-bottom:2px solid transparent;
}
.sb-tab:hover{color:var(--tp)}
.sb-tab.active{color:var(--acc);border-bottom-color:var(--acc)}

/* Sidebar panels */
.sb-panel{display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden}
.sb-panel.active{display:flex}

/* Stats bar */
.sb-stats{
  flex-shrink:0;display:flex;gap:0;
  border-bottom:1px solid var(--border);
}
.sb-stat{
  flex:1;padding:10px 12px;border-right:1px solid var(--border);text-align:center;
}
.sb-stat:last-child{border-right:none}
.sb-stat-n{font-family:'Cinzel',serif;font-size:1.2rem;color:var(--acc);display:block}
.sb-stat-l{font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--tm)}

/* Search */
.sb-search{flex-shrink:0;padding:10px 14px;border-bottom:1px solid var(--border)}
.sb-search-inp{
  width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--tp);padding:7px 10px;font-size:.82rem;font-family:'Crimson Pro',serif;
  outline:none;transition:border .25s;
}
.sb-search-inp:focus{border-color:var(--acc20)}
.sb-search-inp::placeholder{color:var(--tm)}
.sb-filter-row{
  display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;
}
.filter-chip{
  background:none;border:1px solid var(--border);color:var(--tm);
  padding:3px 9px;font-size:.62rem;cursor:pointer;transition:all .2s;
  font-family:'Crimson Pro',serif;letter-spacing:.08em;
}
.filter-chip:hover,.filter-chip.on{background:var(--acc08);border-color:var(--acc20);color:var(--acc)}

/* Meet list */
.meet-list{flex:1;overflow-y:auto;padding:0}
.meet-list::-webkit-scrollbar{width:3px}
.meet-list::-webkit-scrollbar-thumb{background:rgba(77,184,232,.15)}

.meet-item{
  padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);
  cursor:pointer;transition:background .2s;display:flex;gap:10px;
  position:relative;
}
.meet-item:hover{background:rgba(77,184,232,.04)}
.meet-item.active{background:rgba(77,184,232,.06);border-left:2px solid var(--acc)}
.meet-item.imminent{border-left:2px solid var(--red)}
.meet-item.imminent .mi-time{color:var(--red)}

.mi-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;
  box-shadow:0 0 6px currentColor;
}
.mi-dot.demo{background:var(--acc);color:var(--acc)}
.mi-dot.user{background:var(--gold);color:var(--gold)}
.mi-dot.imminent{background:var(--red);color:var(--red)}

.mi-body{flex:1;min-width:0}
.mi-city{
  font-family:'Cinzel',serif;font-size:.78rem;color:var(--tp);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:.06em;
}
.mi-place{font-size:.72rem;color:var(--tm);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-time{
  font-size:.64rem;color:var(--acc);margin-top:4px;
  display:flex;align-items:center;gap:5px;
}
.mi-countdown{
  font-family:'Cinzel',serif;font-size:.7rem;
  background:rgba(77,184,232,.08);border:1px solid rgba(77,184,232,.15);
  padding:2px 7px;
}
.mi-countdown.imminent{background:rgba(224,92,106,.08);border-color:var(--red20);color:var(--red)}
.mi-flag{font-size:.8rem}

/* Meet detail popup (in map popup) */
.mp-box{width:320px;font-family:'Crimson Pro',serif}
.mp-satellite{
  width:100%;height:160px;object-fit:cover;display:block;
  border-bottom:1px solid var(--acc20);
  background:#0a1020;
}
.mp-satellite-wrap{position:relative;overflow:hidden}
.mp-sat-label{
  position:absolute;bottom:6px;left:8px;
  font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(77,184,232,.7);background:rgba(4,8,16,.8);padding:2px 6px;
}
.mp-content{padding:14px}
.mp-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.mp-city{font-family:'Cinzel',serif;font-size:.95rem;color:var(--acc);letter-spacing:.1em}
.mp-place{font-size:.82rem;color:var(--tm);margin-top:2px}
.mp-badge{
  font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;
  padding:3px 8px;border:1px solid;
}
.mp-badge.demo{color:var(--acc);border-color:var(--acc20)}
.mp-badge.user{color:var(--gold);border-color:var(--gold20)}
.mp-divider{height:1px;background:var(--border);margin:10px 0}
.mp-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:.82rem}
.mp-row-icon{font-size:.9rem;flex-shrink:0;width:18px;text-align:center}
.mp-row-val{color:var(--tp)}
.mp-row-lbl{color:var(--tm);font-size:.72rem;margin-left:auto}
.mp-comment{
  font-size:.86rem;color:rgba(210,230,245,.7);font-style:italic;
  line-height:1.7;padding:10px;background:rgba(255,255,255,.03);
  border-left:2px solid var(--acc20);margin:10px 0;
}
.mp-countdown-big{
  text-align:center;padding:12px;
  background:rgba(77,184,232,.06);border:1px solid rgba(77,184,232,.15);
  margin-top:10px;
}
.mp-countdown-label{font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--tm)}
.mp-countdown-val{
  font-family:'Cinzel',serif;font-size:1.3rem;color:var(--acc);
  display:block;margin-top:4px;letter-spacing:.1em;
}
.mp-countdown-big.red{background:rgba(224,92,106,.08);border-color:var(--red20)}
.mp-countdown-big.red .mp-countdown-val{color:var(--red)}
.mp-attendees{
  display:flex;align-items:center;gap:6px;margin-top:10px;
  font-size:.72rem;color:var(--tm);
}

/* ADD FORM */
.add-form{flex:1;overflow-y:auto;padding:14px}
.add-form::-webkit-scrollbar{width:3px}
.add-form::-webkit-scrollbar-thumb{background:rgba(77,184,232,.1)}
.form-title{
  font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.22em;
  text-transform:uppercase;color:var(--acc);margin-bottom:14px;
  padding-bottom:8px;border-bottom:1px solid var(--border);
}
.form-field{margin-bottom:12px}
.form-field label{
  display:block;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--tm);margin-bottom:5px;
}
.form-field input,.form-field select,.form-field textarea{
  width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--tp);padding:8px 10px;font-size:.84rem;
  font-family:'Crimson Pro',serif;outline:none;transition:border .25s;
}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--acc20)}
.form-field input::placeholder,.form-field textarea::placeholder{color:var(--tm)}
.form-field select{cursor:pointer}
.form-field select option{background:#0d1520;color:var(--tp)}
.form-field textarea{resize:none;min-height:70px;line-height:1.6}
.form-row{display:flex;gap:8px}
.form-row .form-field{flex:1}
.form-hint{font-size:.62rem;color:var(--tm);margin-top:4px;font-style:italic}
.form-err{
  display:none;font-size:.72rem;color:var(--red);
  background:rgba(224,92,106,.07);border:1px solid var(--red20);
  padding:6px 10px;margin-bottom:10px;
}
.form-err.show{display:block}
.form-submit{
  width:100%;background:var(--acc08);border:1px solid var(--acc20);
  color:var(--acc);padding:10px;font-size:.7rem;letter-spacing:.2em;
  text-transform:uppercase;cursor:pointer;font-family:'Crimson Pro',serif;
  transition:all .3s;margin-top:6px;
}
.form-submit:hover{background:var(--acc20)}
.form-login-gate{
  text-align:center;padding:30px 16px;
  background:rgba(77,184,232,.04);border:1px solid var(--acc20);
  margin:14px;
}
.form-login-gate p{font-size:.84rem;color:var(--tm);line-height:1.7;font-style:italic;margin-bottom:14px}
.form-login-gate a{color:var(--acc);text-decoration:none;border:1px solid var(--acc20);padding:6px 16px;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;font-family:'Cinzel',serif}

/* MAP HUD OVERLAY */
.map-hud{
  position:absolute;bottom:20px;left:20px;z-index:400;
  display:flex;flex-direction:column;gap:8px;pointer-events:none;
}
.hud-pill{
  background:rgba(4,8,16,.88);border:1px solid rgba(77,184,232,.2);
  padding:5px 12px;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(77,184,232,.7);backdrop-filter:blur(8px);
  display:flex;align-items:center;gap:8px;
}
.hud-dot{width:6px;height:6px;border-radius:50%}
.hud-dot.blue{background:var(--acc)}
.hud-dot.gold{background:var(--gold)}
.hud-dot.red{background:var(--red)}
.map-coord{
  position:absolute;bottom:20px;right:380px;z-index:400;
  background:rgba(4,8,16,.75);border:1px solid var(--border);
  padding:4px 10px;font-size:.58rem;letter-spacing:.14em;
  color:var(--tm);backdrop-filter:blur(8px);pointer-events:none;
  font-family:'Cinzel',serif;
}

/* TOAST */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);
  background:rgba(4,8,16,.96);border:1px solid var(--border);
  color:var(--tp);padding:8px 18px;font-size:.74rem;letter-spacing:.1em;
  z-index:999;opacity:0;transition:all .3s;pointer-events:none;
  font-family:'Crimson Pro',serif;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(86,227,159,.3);color:var(--green)}
.toast.err{border-color:var(--red20);color:var(--red)}


.mob-toggle{
  display:none;position:absolute;top:60px;right:10px;z-index:350;
  background:rgba(4,8,16,.9);border:1px solid var(--acc20);color:var(--acc);
  width:40px;height:40px;align-items:center;justify-content:center;
  font-size:1rem;cursor:pointer;
}

/* LOADING SKELETON */
.skel{
  background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.03) 75%);
  background-size:200% 100%;
  animation:skel-anim 1.5s infinite;
  height:12px;border-radius:2px;margin:4px 0;
}
@keyframes skel-anim{0%{background-position:200% 0}100%{background-position:-200% 0}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(77,184,232,.1);border-radius:2px}

/* ══ MOBILE ════════════════════════════════════════════════ */
html,body{overflow-x:hidden}
@media(max-width:768px){
  /* NAV — hide non-essential items */
  /* MAIN LAYOUT — map top, sidebar bottom */
  .main{flex-direction:column}
  #map{flex:none;height:55vmax;min-height:280px}
  .sidebar{
    width:100%;height:auto;
    border-left:none;border-top:1px solid rgba(77,184,232,.12);
    max-height:45vh;flex-shrink:0;
    overflow-y:auto;
  }
  .mob-toggle{display:none !important} /* not needed anymore */
  .map-hud{bottom:calc(50vmax + 8px);left:8px}
  .hud-pill{font-size:.52rem;padding:3px 8px}
  .map-coord{display:none}
  
  /* SIDEBAR internals */
  .sb-tab{font-size:.54rem;padding:9px 4px;letter-spacing:.12em}
  .sb-stats{border-bottom:1px solid var(--border)}
  .sb-stat{padding:7px 8px}
  .sb-stat-n{font-size:1rem}

<script>

// ══════════════════════════════════════════════
// UNIVERSAL SESSION + NAV — runs on every page
// ══════════════════════════════════════════════
(function(){
  // ── Read session ──
  var CU = null;
  try { var s = localStorage.getItem('tt_session'); if(s) CU = JSON.parse(s); } catch(e){}
  window.CU = CU;

  // ── Update nav user button ──
  function updateNavUser(){
    var btn  = document.getElementById('userBtn');
    var lbl  = document.getElementById('userBtnLbl');
    var dot  = document.getElementById('msgDot');
    if(!btn || !lbl) return;
    if(CU){
      lbl.textContent = CU.nick;
      btn.classList.add('logged');
      try{
        var msgs = JSON.parse(localStorage.getItem('tt_msgs') || '[]');
        var unread = msgs.filter(function(m){ return m.to === CU.nick && !m.read; }).length;
        if(dot){ dot.textContent = unread; dot.style.display = unread ? 'inline-flex' : 'none'; }
      }catch(e){ if(dot) dot.style.display='none'; }
    } else {
      lbl.textContent = 'Entrar';
      btn.classList.remove('logged','ceo');
      if(dot) dot.style.display = 'none';
    }
  }

  // ── User button: go to index.html to open profile/login ──
  function bindUserBtn(){
    var btn = document.getElementById('userBtn');
    if(!btn) return;
    // Only bind if this page doesn't already have openUserModal
    if(typeof window.openUserModal !== 'function'){
      btn.addEventListener('click', function(){
        window.location.href = 'index.html?openUser=1';
      });
    }
  }

  // ── Lang ──
  window.setLang = function(lang){
    try{ localStorage.setItem('tt_lang', lang); }catch(e){}
    var cur = document.getElementById('langCur');
    if(cur) cur.textContent = lang.toUpperCase();
    var dd = document.getElementById('langDD');
    if(dd) dd.classList.remove('open');
    document.querySelectorAll('.lang-opt').forEach(function(b){
      b.classList.toggle('cur', b.textContent.trim().toLowerCase().includes(lang));
    });
  };

  // Restore saved lang on load
  try{
    var sl = localStorage.getItem('tt_lang');
    if(sl){ var cur2=document.getElementById('langCur'); if(cur2) cur2.textContent=sl.toUpperCase(); }
  }catch(e){}

  // ── Hamburger ──
  window.toggleNav = function(){
    var nl=document.getElementById('navLinks'),hm=document.getElementById('navHam');
    if(!nl||!hm)return;
    nl.classList.toggle('open'); hm.classList.toggle('open');
  };
  window.closeNav = function(){
    var nl=document.getElementById('navLinks'),hm=document.getElementById('navHam');
    if(nl)nl.classList.remove('open'); if(hm)hm.classList.remove('open');
  };
  window.toggleLangDD = function(){
    var dd=document.getElementById('langDD'); if(dd)dd.classList.toggle('open');
  };

  // Close lang dropdown on outside click
  document.addEventListener('click',function(e){
    var lb=document.getElementById('langBtn'),dd=document.getElementById('langDD');
    if(dd&&lb&&!lb.contains(e.target)&&!dd.contains(e.target))dd.classList.remove('open');
  });

  // Run
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',function(){ updateNavUser(); bindUserBtn(); });
  } else { updateNavUser(); bindUserBtn(); }
})();
</script>

function timeStr(ts){
  const d=new Date(ts);
  return d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'})+' · '+
         d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}
function countdown(ts){
  const diff=ts-Date.now();
  if(diff<=0)return'AHORA';
  const h=Math.floor(diff/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  if(h>24){const d=Math.floor(h/24);return d+'d '+(h%24)+'h';}
  if(h>0)return h+'h '+m+'m';
  if(m>0)return m+'m '+s+'s';
  return s+'s';
}
function isImminent(ts){return ts-Date.now()<7200000&&ts>Date.now();}
function isActive(ts){return ts>Date.now();}
function isToday(ts){
  const d=new Date(ts),n=new Date();
  return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();
}

function getDemoMeets(){
  const now=Date.now();
  return DEMO_MEETS_BASE.map(m=>({
    ...m,
    ts: now + m.h*3600000,
    demo:true,
    author:'TT_Community',
  }));
}

function getUserMeets(){
  return LS.get('tt_meets',[]).filter(m=>m.ts>Date.now());
}

function getAllMeets(){
  return [...getDemoMeets(),...getUserMeets()].sort((a,b)=>a.ts-b.ts);
}

// ── MAP SETUP ──
let map, activeMarkerId=null;
const markers={};

function initMap(){
  if(typeof L==='undefined')return;
  map=L.map('map',{
    center:[20,10],zoom:3,
    zoomControl:false,
    attributionControl:false,
  });

  // Satellite/dark tile
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    maxZoom:19,subdomains:'abcd',
  }).addTo(map);

  L.control.zoom({position:'bottomleft'}).addTo(map);

  // Coord display
  map.on('mousemove',e=>{
    const el=document.getElementById('mapCoord');
    if(el)el.textContent=e.latlng.lat.toFixed(4)+' / '+e.latlng.lng.toFixed(4);
  });

  // Close popups on map click
  map.on('click',()=>map.closePopup());
}

function makeDivIcon(meet){
  const imm=isImminent(meet.ts);
  const cls=imm?'imminent':meet.demo?'demo':'user';
  const color=imm?'#e05c6a':meet.demo?'#4db8e8':'#c8a95a';
  const html=`
    <div style="position:relative;width:14px;height:14px">
      <div style="position:absolute;top:50%;left:50%;width:32px;height:32px;border-radius:50%;border:1.5px solid ${color};opacity:.5;transform:translate(-50%,-50%);animation:meet-ring 2.2s ease-out infinite;"></div>
      <div style="position:absolute;top:50%;left:50%;width:14px;height:14px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,.8);transform:translate(-50%,-50%);box-shadow:0 0 10px ${color},0 0 20px ${color};cursor:pointer;"></div>
    </div>`;
  return L.divIcon({html,className:'',iconSize:[14,14],iconAnchor:[7,7]});
}

function getSatelliteUrl(lat,lng,zoom=14){
  // Use OpenStreetMap static map approach via staticmap  
  const z=zoom,x=Math.floor((lng+180)/360*Math.pow(2,z)),
    y=Math.floor((1-Math.log(Math.tan(lat*Math.PI/180)+1/Math.cos(lat*Math.PI/180))/Math.PI)/2*Math.pow(2,z));
  // Use a mosaic of tiles for the preview
  return `https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${z}/${y}/${x}`;
}

function buildPopupHTML(m){
  const imm=isImminent(m.ts);
  const satUrl=getSatelliteUrl(m.lat,m.lng,15);
  const cd=countdown(m.ts);
  const badge=m.demo?'<span class="mp-badge demo">Comunidad</span>':'<span class="mp-badge user">Usuario</span>';
  return `
<div class="mp-box">
  <div class="mp-satellite-wrap">
    <img class="mp-satellite" src="${satUrl}" alt="${m.place}" onerror="this.src='https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/13/${Math.floor((1-Math.log(Math.tan(m.lat*Math.PI/180)+1/Math.cos(m.lat*Math.PI/180))/Math.PI)/2*Math.pow(2,13))}/${Math.floor((m.lng+180)/360*Math.pow(2,13))}'">
    <span class="mp-sat-label">📡 Vista satelital</span>
  </div>
  <div class="mp-content">
    <div class="mp-header">
      <div>
        <div class="mp-city">${m.flag||''} ${m.city}, ${m.country}</div>
        <div class="mp-place">📍 ${m.place}</div>
      </div>
      ${badge}
    </div>
    <div class="mp-divider"></div>
    <div class="mp-row"><span class="mp-row-icon">📅</span><span class="mp-row-val">${timeStr(m.ts)}</span></div>
    <div class="mp-row"><span class="mp-row-icon">👤</span><span class="mp-row-val">${m.author}</span><span class="mp-row-lbl">${m.species||''}</span></div>
    ${m.comment?`<div class="mp-comment">"${m.comment}"</div>`:''}
    <div class="mp-countdown-big ${imm?'red':''}">
      <div class="mp-countdown-label">${imm?'⚡ INMINENTE — COMIENZA EN':'Cuenta regresiva'}</div>
      <span class="mp-countdown-val" data-ts="${m.ts}">${cd}</span>
    </div>
    <div class="mp-attendees">🐾 Quedada abierta a todos los theriantypes</div>
  </div>
</div>`;
}

function addMarker(m){
  if(markers[m.id]){markers[m.id].remove();delete markers[m.id];}
  const icon=makeDivIcon(m);
  if(typeof L==='undefined')return;
  const marker=L.marker([m.lat,m.lng],{icon,title:m.city+' — '+m.place}).addTo(map);
  if(!marker||!marker.bindTooltip)return;
  
  // Tooltip
  marker.bindTooltip(`<span style="font-family:'Cinzel',serif;font-size:.64rem;letter-spacing:.1em;color:rgba(210,230,245,.9)">${m.flag||''} ${m.city} · ${countdown(m.ts)}</span>`,{
    permanent:false,direction:'top',offset:[0,-10],
    className:'meet-label-popup'
  });

  if(!marker.on)return;
  marker.on('click',()=>{
    activeMarkerId=m.id;
    const popupContent=buildPopupHTML(m);
    L.popup({maxWidth:340,closeButton:true,offset:[0,-8]})
      .setLatLng([m.lat,m.lng])
      .setContent(popupContent)
      .openOn(map);
    // Highlight in list
    document.querySelectorAll('.meet-item').forEach(el=>el.classList.remove('active'));
    const listItem=document.getElementById('mi_'+m.id);
    if(listItem){listItem.classList.add('active');listItem.scrollIntoView({behavior:'smooth',block:'nearest'});}
  });
  markers[m.id]=marker;
}

function renderAllMarkers(){
  const meets=getAllMeets();
  // Remove old
  Object.values(markers).forEach(m=>m.remove());
  Object.keys(markers).forEach(k=>delete markers[k]);
  meets.forEach(m=>addMarker(m));
}

// ── SIDEBAR LIST ──
let curFilter='all', curSearch='';

function setFilter(f,btn){
  curFilter=f;
  document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  renderList();
}
function filterMeets(q){curSearch=q;renderList();}

function renderList(){
  const list=document.getElementById('meetList');
  if(!list)return;
  let meets=getAllMeets();
  // Filter
  if(curSearch){
    const q=curSearch.toLowerCase();
    meets=meets.filter(m=>(m.city+m.country+m.place+m.comment).toLowerCase().includes(q));
  }
  if(curFilter==='today')meets=meets.filter(m=>isToday(m.ts));
  if(curFilter==='imminent')meets=meets.filter(m=>isImminent(m.ts));
  if(curFilter==='user')meets=meets.filter(m=>!m.demo);

  // Stats
  const all=getAllMeets();
  const el_a=document.getElementById('statActive');
  const el_c=document.getElementById('statCountries');
  const el_t=document.getElementById('statToday');
  if(el_a)el_a.textContent=all.length;
  if(el_c)el_c.textContent=new Set(all.map(m=>m.country)).size;
  if(el_t)el_t.textContent=all.filter(m=>isToday(m.ts)).length;

  if(!meets.length){
    list.innerHTML='<div style="text-align:center;padding:40px 16px;font-size:.84rem;color:var(--tm);font-style:italic">Sin quedadas en este filtro</div>';
    return;
  }
  list.innerHTML=meets.map((m,i)=>{
    const imm=isImminent(m.ts);
    const dot=imm?'imminent':m.demo?'demo':'user';
    return`<div class="meet-item ${imm?'imminent':''}" id="mi_${m.id}" onclick="focusMeet('${m.id}')" style="animation-delay:${i*.03}s">
      <div class="mi-dot ${dot}"></div>
      <div class="mi-body">
        <div class="mi-city">${m.flag||''} ${m.city} <span style="font-size:.62rem;color:var(--tm);font-weight:normal">${m.country}</span></div>
        <div class="mi-place">${m.place}</div>
        <div class="mi-time">
          <span>${new Date(m.ts).toLocaleDateString('es-ES',{day:'numeric',month:'short'})} ${new Date(m.ts).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}</span>
          <span class="mi-countdown ${imm?'imminent':''}" data-ts="${m.ts}" id="cd_${m.id}">${countdown(m.ts)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function focusMeet(id){
  const all=getAllMeets();
  const m=all.find(x=>x.id===id);
  if(!m)return;
  map.flyTo([m.lat,m.lng],14,{duration:1.2});
  setTimeout(()=>{
    if(markers[id]){markers[id].fire('click');}
  },1300);
  document.querySelectorAll('.meet-item').forEach(el=>el.classList.remove('active'));
  const li=document.getElementById('mi_'+id);
  if(li)li.classList.add('active');
}

// ── COUNTDOWN TICKER ──
function tickCountdowns(){
  document.querySelectorAll('[data-ts]').forEach(el=>{
    const ts=parseInt(el.dataset.ts);
    el.textContent=countdown(ts);
  });
  // Update popup if open
  const popupVal=document.querySelector('.mp-countdown-val[data-ts]');
  if(popupVal){
    const ts=parseInt(popupVal.dataset.ts);
    popupVal.textContent=countdown(ts);
    if(isImminent(ts))popupVal.closest('.mp-countdown-big').classList.add('red');
  }
}

function submitMeet(){
  const CU=getSession();
  if(!CU){showToast('Inicia sesión primero','err');return;}

  const city=(document.getElementById('fCity')||{}).value||'';
  const country=(document.getElementById('fCountry')||{}).value||'';
  const flag=(document.getElementById('fFlag')||{}).value||'';
  const place=(document.getElementById('fPlace')||{}).value||'';
  const lat=parseFloat((document.getElementById('fLat')||{}).value||'');
  const lng=parseFloat((document.getElementById('fLng')||{}).value||'');
  const dateVal=(document.getElementById('fDate')||{}).value||'';
  const species=(document.getElementById('fSpecies')||{}).value||'';
  const comment=(document.getElementById('fComment')||{}).value||'';

  const err=document.getElementById('addErr');
  function showE(msg){if(err){err.textContent=msg;err.classList.add('show');}showToast(msg,'err');}
  if(err)err.classList.remove('show');

  if(!city||!country||!place||!dateVal){showE('Rellena los campos obligatorios (*)');return;}
  if(isNaN(lat)||isNaN(lng)||lat<-90||lat>90||lng<-180||lng>180){showE('Coordenadas inválidas — usa Google Maps para obtenerlas');return;}
  const ts=new Date(dateVal).getTime();
  if(isNaN(ts)||ts<=Date.now()+1800000){showE('La fecha debe ser al menos 30 minutos en el futuro');return;}
  if(ts>Date.now()+90*24*3600000){showE('Máximo 90 días en el futuro');return;}

  const meet={
    id:'u'+Date.now()+Math.random().toString(36).slice(2,5),
    city,country,flag,place,lat,lng,ts,species,comment,
    demo:false,author:CU.nick,
  };
  const meets=LS.get('tt_meets',[]);
  meets.push(meet);
  LS.set('tt_meets',meets);

  addMarker(meet);
  renderList();
  map.flyTo([lat,lng],14,{duration:1.5});
  setTimeout(()=>{if(markers[meet.id])markers[meet.id].fire('click');},1700);

  // ── Auto-post to feed ──
  const dt=new Date(ts);
  const dateStr=dt.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  const timeStr=dt.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  const feedBody=`📍 GatherMap — ${flag} ${city}, ${country}\n🌿 ${place}\n📅 ${dateStr} a las ${timeStr}${comment?'\n"'+comment+'"':''}`;
  const feedPost={
    id:'gm'+Date.now()+Math.random().toString(36).slice(2,5),
    ts:Date.now(),
    nick:CU.nick,
    av:CU.nick[0].toUpperCase(),
    avatarId:CU.avatarId||'',
    species:species||CU.species||'',
    mood:'📍',
    body:feedBody,
    tag:'Pack',
    embedSrc:'',
    howls:0,replies:0,
    gathermap:true  // flag so feed can style it specially
  };
  try{
    const posts=JSON.parse(localStorage.getItem('tt_posts')||'[]');
    posts.unshift(feedPost);
    localStorage.setItem('tt_posts',JSON.stringify(posts.slice(0,500)));
  }catch(e){}

  showToast('¡GatherSpot publicado en el mapa y en el feed! 🐾','ok');
  switchTab('list',document.querySelector('.sb-tab'));
}

// ── TAB SWITCH ──
function switchTab(name,btn){
  document.querySelectorAll('.sb-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.sb-panel').forEach(p=>p.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const panel=name==='list'?document.getElementById('panList'):document.getElementById('panAdd');
  if(panel)panel.classList.add('active');
  if(name==='add')renderAddForm();
}

// ── MOBILE ──
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  if(sb)sb.classList.toggle('open');
}

// ── TOAST ──
let toastT;
function showToast(msg,type=''){
  const el=document.getElementById('toast');
  if(!el)return;
  el.textContent=msg;el.className='toast'+(type?' '+type:'');
  clearTimeout(toastT);
  requestAnimationFrame(()=>el.classList.add('show'));
  toastT=setTimeout(()=>el.classList.remove('show'),3500);
}

// ── CLEAN EXPIRED USER MEETS ──
function cleanExpired(){
  const meets=LS.get('tt_meets',[]).filter(m=>m.ts>Date.now());
  LS.set('tt_meets',meets);
}

// ── INIT ──
document.addEventListener('DOMContentLoaded',function(){
  // ── Nav user button ──
  const CU=getSession();
  // (user btn removed from this nav, handled by universal nav)

  cleanExpired();
  renderList(); // render list immediately (no map needed)
  setInterval(tickCountdowns,1000);
  setInterval(()=>{cleanExpired();renderAllMarkers();renderList();},300000);
});

// ── Map init — waits for Leaflet CDN ──
function _doInitMap(){
  if(typeof L === 'undefined'){
    setTimeout(_doInitMap, 150);
    return;
  }
  initMap();
  renderAllMarkers();
  const all=getAllMeets();
  if(all.length){
    const pick=all[Math.floor(Math.random()*Math.min(all.length,10))];
    setTimeout(()=>{if(map)map.flyTo([pick.lat,pick.lng],4,{duration:3});},600);
  }
}
// Hook into loader OR fallback poll
if(window._leafletReady){ _doInitMap(); }
else { window._onLeafletReady = _doInitMap; setTimeout(_doInitMap, 300); }
</script>
